# Core Go Framework build configuration
# Used by: core build
# Note: This is a library module (no binary). Build validates compilation only.

version: 1

project:
  name: core-go
  description: Core Go Framework — dependency injection and lifecycle management
  binary: ""

build:
  cgo: false
  flags:
    - -trimpath
  ldflags:
    - -s
    - -w

targets:
  - os: linux
    arch: amd64
  - os: linux
    arch: arm64
  - os: darwin
    arch: arm64
  - os: windows
    arch: amd64
