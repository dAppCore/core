version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "type:dependencies"
      - "priority:low"
    commit-message:
      prefix: "deps(go):"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "type:dependencies"
      - "priority:low"
    commit-message:
      prefix: "deps(actions):"

