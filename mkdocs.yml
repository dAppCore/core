site_name: Core Framework
site_url: https://core.help
site_description: 'A Web3 Framework for building Go desktop applications with Wails v3'
site_author: 'Snider'
repo_url: 'https://github.com/host-uk/core'
repo_name: 'host-uk/core'

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - User Documentation:
    - User Guide: user-guide.md
    - FAQ: faq.md
    - Troubleshooting: troubleshooting.md
    - Workflows: workflows.md
  - CLI Reference:
    - Overview: cmd/index.md
    - AI: cmd/ai/index.md
    - Build: cmd/build/index.md
    - CI: cmd/ci/index.md
    - Dev: cmd/dev/index.md
    - Go: cmd/go/index.md
    - PHP: cmd/php/index.md
    - SDK: cmd/sdk/index.md
    - Setup: cmd/setup/index.md
    - Doctor: cmd/doctor/index.md
    - Test: cmd/test/index.md
    - VM: cmd/vm/index.md
    - Pkg: cmd/pkg/index.md
    - Docs: cmd/docs/index.md
  - Getting Started:
